<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Matt Hurski</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="леваястороназановеса-mobile.jpg" fetchpriority="high" media="(max-width: 700px)">
<link rel="preload" as="image" href="праваястороназановеса-mobile.jpg.jpg" fetchpriority="high" media="(max-width: 700px)">
<style>
  :root {
    --red: #e62a14;
    --cream: #f7f3e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--red);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Instrument Serif', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ───────────────────────────────────────── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
  }

  .logo {
    display: flex; align-items: center;
    text-decoration: none;
  }
  .logo img {
    width: 52px; height: 52px;
    animation: spin-slow 8s linear infinite;
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .logo:hover img { opacity: 0.7; }

  .header-center {
    font-family: 'DM Sans', Helvetica, sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--cream);
    text-decoration: none;
    transition: opacity .2s ease;
  }

  .header-center:hover { opacity: 0.6; }

  .header-right {
    font-family: 'DM Sans', Helvetica, sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--cream);
    text-decoration: none;
    transition: opacity .2s ease;
  }

  .header-right:hover { opacity: 0.6; }

  /* ── NOT FOUND ────────────────────────────────────── */
  .not-found {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    max-width: 1320px;
    width: 100%;
    margin: 0 auto;
    padding: 4vh 56px 16vh;
    gap: 6vh;
  }

  .code {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(4px, 1.2vw, 18px);
    font-family: 'DM Sans', Helvetica, sans-serif;
    font-size: clamp(110px, 22vw, 320px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .ball-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 0.82em;
    height: 0.82em;
    margin: 0 -0.06em;
  }

  .ball-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: ball-bounce 3.2s ease-in-out infinite;
  }

  @keyframes ball-bounce {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-0.07em) rotate(18deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .ball-wrap img { animation: none; }
  }

  .not-found-bottom {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    text-align: center;
  }

  .not-found-bottom h1 {
    font-style: italic;
    font-weight: 400;
    font-size: clamp(32px, 6vw, 84px);
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    color: var(--cream);
    text-decoration: none;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    font-size: 15px;
    border: 1.5px solid var(--cream);
    border-radius: 999px;
    padding: 16px 28px 16px 32px;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
    transition: color .4s ease;
  }
  .home-link::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--cream);
    transform: translateX(-100%);
    transition: transform .4s cubic-bezier(0.4,0,0.2,1);
    z-index: 0;
  }
  .home-link:hover::before { transform: translateX(0); }
  .home-link:hover { color: var(--red); }
  .home-link span, .home-link svg { position: relative; z-index: 1; }

  .home-link svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    transition: transform .2s ease;
  }

  .home-link:hover svg {
    transform: translateX(3px);
  }

  /* ── CONTACT / FOOTER ─────────────────────────────── */
  footer {
    background: var(--red);
    color: #fff;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    padding: 64px 56px 32px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }

  .footer-grid {
    max-width: 1320px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: space-between;
    padding-bottom: 40px;
  }

  .footer-col h3 {
    font-family: 'DM Sans', 'Inter', Helvetica, sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    color: #fff;
  }

  .footer-col a {
    display: block;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    margin-bottom: 8px;
    opacity: 0.9;
    transition: opacity .2s ease;
  }

  .footer-col a:hover {
    opacity: 0.6;
  }

  .footer-col .note {
    opacity: 0.65;
    font-size: 13px;
  }

  .footer-col--center,
  .footer-col--right {
    text-align: left;
  }

  .footer-col a.icon-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .footer-col a.icon-link svg {
    width: 18px;
    height: 18px;
    flex: none;
  }

  .footer-bottom {
    max-width: 1320px;
    margin: 0 auto;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.25);
    font-size: 14px;
    color: rgba(255,255,255,0.8);
  }

  .footer-hurski {
    width: 100%;
    margin-top: 40px;
    line-height: 0;
    display: flex;
    align-items: flex-end;
  }
  .footer-hurski .hurski-text {
    flex: 1;
    height: auto;
    display: block;
    min-width: 0;
  }
  .footer-hurski .hurski-dot {
    flex-shrink: 0;
    width: 14%;
    aspect-ratio: 1;
    animation: spin-slow 8s linear infinite;
    margin-bottom: -0.5%;
    margin-left: -2%;
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── RESPONSIVE ───────────────────────────────────── */
  @media (max-width: 700px) {
    header { padding: 24px 24px; }
    nav { gap: 8px; }
    nav a { font-size: 13px; padding: 7px 16px; }
    .not-found { padding: 2vh 24px 4vh; gap: 4vh; }
    .not-found-bottom { gap: 20px; }
    .not-found-bottom h1 { width: 100%; }
    footer { padding: 48px 24px 24px; }
    .footer-grid { flex-direction: column; gap: 28px; padding-bottom: 28px; }
    .footer-col--center, .footer-col--right { text-align: left; }
  }

  /* ── MOBILE: DESKTOP-ONLY NOTICE ──────────────────── */
  @media (max-width: 700px) {
    body > *:not(.mobile-block):not(.curtain-mobile) {
      display: none !important;
    }

    html, body {
      overflow: hidden;
      height: 100%;
    }

    .mobile-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6vh;
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: var(--red);
      color: var(--cream);
      font-family: 'Instrument Serif', Georgia, serif;
      text-align: center;
      padding: 6vh 24px;
      -webkit-font-smoothing: antialiased;
    }

    .mobile-block .code {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 3vw, 18px);
      font-size: clamp(90px, 30vw, 160px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .mobile-block .ball-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.82em;
      height: 0.82em;
      margin: 0 -0.06em;
    }

    .mobile-block .ball-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: mobile-ball-bounce 3.2s ease-in-out infinite;
    }

    .mobile-block h1 {
      font-style: italic;
      font-weight: 400;
      font-size: clamp(26px, 7vw, 42px);
      letter-spacing: -0.01em;
      line-height: 1.3;
      max-width: 20ch;
    }

    @keyframes mobile-ball-bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-0.07em) rotate(18deg); }
    }

    .curtain-mobile {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 51%;
      z-index: 10000;
      pointer-events: none;
      background-color: #7a0d10;
      background-repeat: no-repeat;
      background-size: cover;
      box-shadow: inset 0 0 140px rgba(0,0,0,0.65);
      transition: transform 1.1s cubic-bezier(.76,0,.24,1);
    }

    .curtain-mobile-left {
      left: 0;
      border-right: 2px solid rgba(0,0,0,0.4);
      background-image: url("леваястороназановеса-mobile.jpg");
      background-position: right center;
    }

    .curtain-mobile-right {
      right: 0;
      border-left: 2px solid rgba(0,0,0,0.4);
      background-image: url("праваястороназановеса-mobile.jpg.jpg");
      background-position: left center;
    }

    .curtain-mobile.open.curtain-mobile-left {
      transform: translateX(-101%);
    }

    .curtain-mobile.open.curtain-mobile-right {
      transform: translateX(101%);
    }

    @media (prefers-reduced-motion: reduce) {
      .mobile-block .ball-wrap img { animation: none; }
      .curtain-mobile { display: none; }
    }
  }

  @media (min-width: 701px) {
    .mobile-block,
    .curtain-mobile {
      display: none !important;
    }
  }
</style>
</head>
<body>

<script>
(function () {
  if (!window.matchMedia('(max-width: 700px)').matches) return;

  var left = document.getElementById('curtainMobileLeft');
  var right = document.getElementById('curtainMobileRight');
  if (!left || !right) return;

  function openMobileCurtains() {
    left.classList.add('open');
    right.classList.add('open');
    setTimeout(function () {
      left.remove();
      right.remove();
    }, 1300);
  }

  function start() {
    setTimeout(openMobileCurtains, 400);
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    start();
  } else {
    document.addEventListener('DOMContentLoaded', start);
  }
})();
</script>
